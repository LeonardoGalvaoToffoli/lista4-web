<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro de Usuário</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="container">
    <h2>Cadastro de Participante</h2>

    <div id="timer" class="timer-box">
      Carregando timer...
    </div>

    <form action="resultado.html" method="get" id="cadastroForm">
      <div class="input-group">
        <label for="nome">Nome</label>
        <input type="text" id="nome" name="nome" required>
      </div>

      <div class="input-group">
        <label for="email">E-mail</label>
        <input type="email" id="email" name="email" required>
      </div>

      <div class="input-group">
        <label for="cpf">CPF</label>
        <input type="text" id="cpf" name="cpf" maxlength="14" placeholder="Apenas numeros" required>
        <span id="cpfStatus"></span>
      </div>

      <div class="input-group">
        <label for="telefone">Telefone</label>
        <input type="tel" id="telefone" name="telefone" required>
      </div>

      <button type="submit" id="btnCadastrar" disabled>Cadastrar</button>
    </form>
  </div>

  <script src="script.js"></script>
</body>

</html>
